<!doctype html>
<html lang="en" class="h-full">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MiniBook Demo</title>
		<script>
			window.tailwind = {
				config: {
					darkMode: 'class',
				},
			}
		</script>
		<script src="https://cdn.tailwindcss.com"></script>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	</head>
	<body
		class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100"
	>
		<div class="min-h-full">
			<header
				class="border-b border-slate-200 bg-white/70 backdrop-blur dark:border-slate-800 dark:bg-slate-900/70"
			>
				<div
					class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4"
				>
					<div>
						<h1 class="text-xl font-semibold">MiniBook</h1>
						<p class="text-sm text-slate-500 dark:text-slate-400">
							One-page social feed demo
						</p>
					</div>
					<div class="flex items-center gap-3">
						<div id="userBadge" class="relative"></div>
					</div>
				</div>
			</header>

			<main
				class="mx-auto flex w-full max-w-5xl flex-col gap-8 px-4 py-8 lg:flex-row"
			>
				<section class="w-full lg:w-1/3">
					<div
						class="rounded-2xl border border-slate-200 bg-white p-5 text-sm text-slate-500 shadow-sm dark:border-slate-800 dark:bg-slate-900 dark:text-slate-400"
					>
						<p class="font-medium text-slate-700 dark:text-slate-200">
							Server + Client Lessons
						</p>
						<ul class="mt-3 list-disc space-y-2 pl-4">
							<li>Form submits to API endpoints.</li>
							<li>Server authenticates with cookies.</li>
							<li>SQLite stores posts and likes.</li>
							<li>UI updates with fetch + DOM.</li>
						</ul>
					</div>
				</section>

				<section class="w-full lg:w-2/3">
					<div
						class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900"
					>
						<h2 class="text-lg font-semibold">Create a post</h2>
						<form
							id="postForm"
							action="/api/posts"
							method="post"
							class="mt-4 flex flex-col gap-3"
						>
							<textarea
								class="min-h-[120px] w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
								name="content"
								placeholder="Share something with your class..."
								maxlength="500"
								required
							></textarea>
							<div class="flex items-center justify-between">
								<span class="text-xs text-slate-500 dark:text-slate-400">
									Max 500 characters
								</span>
								<button
									class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
									type="submit"
								>
									Post
								</button>
							</div>
						</form>
					</div>

					<div class="mt-6 flex items-center justify-between">
						<h2 class="text-lg font-semibold">Feed</h2>
						<a
							href="/"
							class="rounded-lg border border-slate-200 px-3 py-1 text-sm dark:border-slate-700"
						>
							Refresh
						</a>
					</div>

					<div id="feed" class="mt-4 space-y-4"></div>
				</section>
			</main>
		</div>

		<script src="/public/app.js"></script>
	</body>
</html>
