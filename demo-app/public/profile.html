<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - MiniBook Demo</title>
    <script>
      window.tailwind = {
        config: {
          darkMode: "class",
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div class="min-h-full">
      <header class="border-b border-slate-200 bg-white/70 backdrop-blur dark:border-slate-800 dark:bg-slate-900/70">
        <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
          <div>
            <h1 class="text-xl font-semibold">
              <a href="/" class="hover:underline">MiniBook</a>
            </h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">Edit Profile</p>
          </div>
          <div class="flex items-center gap-3">
            <div id="userBadge" class="flex items-center gap-3"></div>
          </div>
        </div>
      </header>

      <main class="mx-auto flex w-full max-w-2xl flex-col gap-6 px-4 py-8">
        <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
          <h2 class="text-xl font-semibold">Edit Profile</h2>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
            Update your username and password.
          </p>

          <div id="message" class="mt-4"></div>

          <form action="/api/profile" method="post" enctype="multipart/form-data" class="mt-6 flex flex-col gap-6">
            <div>
              <label
                class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300"
              >
                Profile Image
              </label>
              <div class="flex items-center gap-4">
                <img
                  id="avatarPreview"
                  src=""
                  alt="Profile"
                  class="h-16 w-16 rounded-full border-2 border-slate-200 object-cover dark:border-slate-700"
                  style="display: none;"
                />
                <div class="flex-1">
                  <input
                    id="avatar"
                    name="avatar"
                    type="file"
                    accept="image/jpeg,image/png,image/gif,image/webp"
                    class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                  />
                  <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">
                    JPEG, PNG, GIF, or WebP (max 5MB). Leave empty to keep current image.
                  </p>
                </div>
              </div>
            </div>

            <div>
              <label
                for="username"
                class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300"
              >
                Username
              </label>
              <input
                id="username"
                name="username"
                type="text"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                placeholder="Enter new username"
                autocomplete="username"
                required
              />
            </div>

            <div class="border-t border-slate-200 pt-6 dark:border-slate-800">
              <h3 class="mb-4 text-sm font-semibold text-slate-700 dark:text-slate-300">
                Change Password
              </h3>
              <p class="mb-4 text-xs text-slate-500 dark:text-slate-400">
                Leave password fields empty if you don't want to change your password.
              </p>

              <div class="flex flex-col gap-4">
                <div>
                  <label
                    for="currentPassword"
                    class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300"
                  >
                    Current Password
                  </label>
                  <input
                    id="currentPassword"
                    name="currentPassword"
                    type="password"
                    class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                    placeholder="Enter current password"
                    autocomplete="current-password"
                  />
                </div>

                <div>
                  <label
                    for="password"
                    class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300"
                  >
                    New Password
                  </label>
                  <input
                    id="password"
                    name="password"
                    type="password"
                    class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                    placeholder="Enter new password"
                    autocomplete="new-password"
                  />
                </div>
              </div>
            </div>

            <div class="flex items-center gap-3">
              <a
                href="/"
                class="rounded-lg border border-slate-200 px-4 py-2 text-sm dark:border-slate-700"
              >
                Cancel
              </a>
              <button
                class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
                type="submit"
              >
                Save Changes
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="/public/profile.js"></script>
  </body>
</html>
