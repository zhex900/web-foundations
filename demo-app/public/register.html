<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - MiniBook Demo</title>
    <script>
      window.tailwind = {
        config: {
          darkMode: "class",
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div class="flex min-h-full items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-bold">MiniBook</h1>
          <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">
            Create a new account
          </p>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm dark:border-slate-800 dark:bg-slate-900">
          <h2 class="text-xl font-semibold">Sign up</h2>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
            Create an account to start posting and interacting.
          </p>

          <form
            action="/api/register"
            method="post"
            enctype="multipart/form-data"
            class="mt-6 flex flex-col gap-4"
          >
            <div>
              <label
                for="username"
                class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300"
              >
                Username
              </label>
              <input
                id="username"
                name="username"
                type="text"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                placeholder="Choose a username"
                autocomplete="username"
                minlength="3"
                required
                autofocus
              />
              <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">
                At least 3 characters
              </p>
            </div>

            <div>
              <label
                for="password"
                class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300"
              >
                Password
              </label>
              <input
                id="password"
                name="password"
                type="password"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                placeholder="Choose a password"
                autocomplete="new-password"
                minlength="4"
                required
              />
              <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">
                At least 4 characters
              </p>
            </div>

            <div>
              <label
                for="confirmPassword"
                class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300"
              >
                Confirm Password
              </label>
              <input
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                placeholder="Confirm your password"
                autocomplete="new-password"
                required
              />
            </div>

            <div>
              <label
                for="avatar"
                class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300"
              >
                Profile Image (Optional)
              </label>
              <input
                id="avatar"
                name="avatar"
                type="file"
                accept="image/jpeg,image/png,image/gif,image/webp"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
              />
              <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">
                JPEG, PNG, GIF, or WebP (max 5MB)
              </p>
            </div>

            <div id="errorMessage" class="hidden rounded-lg bg-red-50 p-3 text-sm text-red-600 dark:bg-red-900/20 dark:text-red-400"></div>

            <button
              class="w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
              type="submit"
            >
              Create Account
            </button>
          </form>

          <div class="mt-6 text-center">
            <p class="text-sm text-slate-500 dark:text-slate-400">
              Already have an account?
              <a href="/login" class="ml-1 text-blue-600 hover:underline dark:text-blue-400">
                Sign in
              </a>
            </p>
          </div>
        </div>

      </div>
    </div>

    <script>
      const errorMessage = document.getElementById("errorMessage");

      const urlParams = new URLSearchParams(window.location.search);
      const error = urlParams.get("error");
      let errorText = "";

      if (error === "username_taken") {
        errorText = "Username is already taken. Please choose another.";
      } else if (error === "username_invalid") {
        errorText = "Username must be at least 3 characters long.";
      } else if (error === "password_invalid") {
        errorText = "Password must be at least 4 characters long.";
      } else if (error === "password_mismatch") {
        errorText = "Passwords do not match. Please try again.";
      }

      if (errorText) {
        errorMessage.textContent = errorText;
        errorMessage.classList.remove("hidden");
      }
    </script>
  </body>
</html>
