<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MiniBook Demo</title>
    <script>
      window.tailwind = {
        config: {
          darkMode: "class",
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div class="flex min-h-full items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-bold">MiniBook</h1>
          <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">
            One-page social feed demo
          </p>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm dark:border-slate-800 dark:bg-slate-900">
          <h2 class="text-xl font-semibold">Sign in</h2>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
            Use the demo account to post, reply, and like.
          </p>

          <form
            action="/api/login"
            method="post"
            class="mt-6 flex flex-col gap-4"
          >
            <div>
              <label
                for="username"
                class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300"
              >
                Username
              </label>
              <input
                id="username"
                name="username"
                type="text"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                placeholder="demo"
                autocomplete="username"
                required
                autofocus
              />
            </div>

            <div>
              <label
                for="password"
                class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300"
              >
                Password
              </label>
              <input
                id="password"
                name="password"
                type="password"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
                placeholder="password"
                autocomplete="current-password"
                required
              />
            </div>

            <div id="errorMessage" class="hidden rounded-lg bg-red-50 p-3 text-sm text-red-600 dark:bg-red-900/20 dark:text-red-400"></div>

            <button
              class="w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
              type="submit"
            >
              Log in
            </button>
          </form>

          <div class="mt-6 rounded-lg border border-slate-200 bg-slate-50 p-4 text-xs text-slate-500 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-400">
            <p class="font-medium text-slate-700 dark:text-slate-200">
              Demo credentials:
            </p>
            <p class="mt-1">Username: <code class="font-mono">demo</code></p>
            <p>Password: <code class="font-mono">password</code></p>
          </div>

          <div class="mt-6 text-center">
            <p class="text-sm text-slate-500 dark:text-slate-400">
              Don't have an account?
              <a href="/register" class="ml-1 text-blue-600 hover:underline dark:text-blue-400">
                Sign up
              </a>
            </p>
          </div>
        </div>

      </div>
    </div>

    <script>
      const errorMessage = document.getElementById("errorMessage");

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get("login") === "failed") {
        errorMessage.textContent = "Invalid credentials. Try demo / password.";
        errorMessage.classList.remove("hidden");
      }
    </script>
  </body>
</html>
